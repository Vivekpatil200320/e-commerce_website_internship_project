<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>E-Commerce Store - Home</title>
    
    <!-- Bootstrap 4.5 CSS -->
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    
    <!-- Font Awesome 5.10.0 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.10.0/css/all.min.css">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/custom.css">
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="index.html">
                <i class="fas fa-store"></i> E-Commerce Store
            </a>
            <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarNav" 
                    aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ml-auto">
                    <li class="nav-item active">
                        <a class="nav-link" href="index.html">
                            <i class="fas fa-home"></i> Home
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="products.html">
                            <i class="fas fa-box"></i> Products
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="categories.html">
                            <i class="fas fa-list"></i> Categories
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="cart.html">
                            <i class="fas fa-shopping-cart"></i> Cart
                            <span class="badge badge-pill badge-danger cart-badge">0</span>
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main>
        <!-- Hero Section -->
        <section class="hero-section bg-light py-5">
            <div class="container text-center">
                <h1 class="display-4">Welcome to Our Store</h1>
                <p class="lead">Discover amazing products at great prices</p>
                <a href="products.html" class="btn btn-primary btn-lg">
                    <i class="fas fa-shopping-bag"></i> Shop Now
                </a>
            </div>
        </section>

        <!-- Featured Products Section -->
        <section class="featured-products py-5">
            <div class="container">
                <h2 class="text-center mb-4">Featured Products</h2>
                <div id="featured-products-container" class="row">
                    <!-- Featured products will be loaded here dynamically -->
                </div>
            </div>
        </section>
    </main>

    <!-- Footer -->
    <footer class="bg-dark text-white py-4 mt-5">
        <div class="container text-center">
            <p class="mb-0">&copy; 2024 E-Commerce Store. All rights reserved.</p>
        </div>
    </footer>

    <!-- jQuery 3.x -->
    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    
    <!-- Bootstrap 4.5 JS -->
    <script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.1/dist/umd/popper.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
    
    <!-- Products Module -->
    <script src="js/products.js"></script>
    
    <!-- Cart Module -->
    <script src="js/cart.js"></script>
    
    <!-- Custom JS -->
    <script src="js/main.js"></script>
    
    <!-- Application Controller -->
    <script src="js/app.js"></script>
    
    <!-- Featured Products Script -->
    <script>
        $(document).ready(function() {
            // Load and display featured products
            ProductsModule.getFeaturedProducts()
                .then(function(products) {
                    renderFeaturedProducts(products);
                })
                .catch(function(error) {
                    console.error('Error loading featured products:', error);
                    $('#featured-products-container').html(
                        '<div class="col-12 text-center">' +
                        '<p class="text-danger">Failed to load featured products. Please try again later.</p>' +
                        '</div>'
                    );
                });
        });

        /**
         * Render featured products in the grid
         * @param {Array} products - Array of featured products
         */
        function renderFeaturedProducts(products) {
            const container = $('#featured-products-container');
            container.empty();

            // Limit to 6 featured products
            const featuredProducts = products.slice(0, 6);

            if (featuredProducts.length === 0) {
                container.html(
                    '<div class="col-12 text-center">' +
                    '<p class="text-muted">No featured products available at this time.</p>' +
                    '</div>'
                );
                return;
            }

            featuredProducts.forEach(function(product) {
                const productCard = createProductCard(product);
                container.append(productCard);
            });
        }

        /**
         * Create a product card element
         * @param {Object} product - Product object
         * @returns {jQuery} jQuery element for the product card
         */
        function createProductCard(product) {
            // Truncate description to brief version (first 100 characters)
            const briefDescription = product.description.length > 100 
                ? product.description.substring(0, 100) + '...' 
                : product.description;

            // Get first image or use placeholder
            const imageUrl = product.images && product.images.length > 0 
                ? product.images[0] 
                : 'images/placeholder.jpg';

            // Create card HTML with responsive grid classes
            const cardHtml = 
                '<div class="col-12 col-sm-6 col-md-4 col-lg-3 mb-4">' +
                    '<div class="card h-100 product-card" data-product-id="' + product.id + '" style="cursor: pointer;">' +
                        '<img src="' + imageUrl + '" class="card-img-top" alt="' + product.name + '" ' +
                             'onerror="this.src=\'images/placeholder.jpg\'">' +
                        '<div class="card-body d-flex flex-column">' +
                            '<h5 class="card-title">' + product.name + '</h5>' +
                            '<p class="card-text text-muted small">' + briefDescription + '</p>' +
                            '<div class="mt-auto">' +
                                '<p class="h5 text-primary mb-2">$' + product.price.toFixed(2) + '</p>' +
                                (product.availability 
                                    ? '<span class="badge badge-success">In Stock</span>' 
                                    : '<span class="badge badge-secondary">Out of Stock</span>') +
                            '</div>' +
                        '</div>' +
                    '</div>' +
                '</div>';

            const $card = $(cardHtml);

            // Add click handler to navigate to product detail page
            $card.find('.product-card').on('click', function() {
                window.location.href = 'product-detail.html?id=' + product.id;
            });

            return $card;
        }
    </script>
</body>
</html>
