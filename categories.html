<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Categories - E-Commerce Store</title>
    
    <!-- Bootstrap 4.5 CSS -->
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    
    <!-- Font Awesome 5.10.0 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.10.0/css/all.min.css">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/custom.css">
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="index.html">
                <i class="fas fa-store"></i> E-Commerce Store
            </a>
            <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarNav" 
                    aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ml-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="index.html">
                            <i class="fas fa-home"></i> Home
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="products.html">
                            <i class="fas fa-box"></i> Products
                        </a>
                    </li>
                    <li class="nav-item active">
                        <a class="nav-link" href="categories.html">
                            <i class="fas fa-list"></i> Categories
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="cart.html">
                            <i class="fas fa-shopping-cart"></i> Cart
                            <span class="badge badge-pill badge-danger cart-badge">0</span>
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main>
        <div class="container py-4">
            <div class="mb-4">
                <h1>Shop by Category</h1>
                <p class="text-muted">Browse our product categories</p>
            </div>

            <!-- Loading Indicator -->
            <div id="loading-indicator" class="text-center py-5">
                <div class="loading-spinner"></div>
                <p class="mt-3 text-muted">Loading categories...</p>
            </div>

            <!-- Categories Container -->
            <div id="categories-container" class="row" style="display: none;">
                <!-- Categories will be loaded here dynamically -->
            </div>

            <!-- No Categories Message -->
            <div id="no-categories-message" class="text-center py-5" style="display: none;">
                <i class="fas fa-folder-open fa-3x text-muted mb-3"></i>
                <p class="text-muted">No categories available.</p>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="bg-dark text-white py-4 mt-5">
        <div class="container text-center">
            <p class="mb-0">&copy; 2024 E-Commerce Store. All rights reserved.</p>
        </div>
    </footer>

    <!-- jQuery 3.x -->
    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    
    <!-- Bootstrap 4.5 JS -->
    <script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.1/dist/umd/popper.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
    
    <!-- Products Module -->
    <script src="js/products.js"></script>
    
    <!-- Cart Module -->
    <script src="js/cart.js"></script>
    
    <!-- Custom JS -->
    <script src="js/main.js"></script>
    
    <!-- Application Controller -->
    <script src="js/app.js"></script>
    
    <!-- Categories Page Script -->
    <script>
        $(document).ready(function() {
            initCategoriesPage();
        });

        /**
         * Initialize the categories page
         */
        function initCategoriesPage() {
            loadCategories();
        }

        /**
         * Load and display categories
         */
        function loadCategories() {
            showLoading();

            // Load all products to count products per category
            ProductsModule.loadProducts()
                .then(function(products) {
                    return ProductsModule.getCategories().then(function(categories) {
                        return { categories: categories, products: products };
                    });
                })
                .then(function(data) {
                    hideLoading();
                    
                    if (data.categories.length === 0) {
                        showNoCategories();
                        return;
                    }

                    renderCategories(data.categories, data.products);
                })
                .catch(function(error) {
                    hideLoading();
                    console.error('Error loading categories:', error);
                    showError('Failed to load categories. Please try again later.');
                });
        }

        /**
         * Render categories on the page
         * @param {Array} categories - Array of category names
         * @param {Array} products - Array of all products
         */
        function renderCategories(categories, products) {
            const container = $('#categories-container');
            container.empty();

            categories.forEach(function(category) {
                // Count products in this category
                const productCount = products.filter(function(p) {
                    return p.category === category;
                }).length;

                const categoryCard = createCategoryCard(category, productCount);
                container.append(categoryCard);
            });

            container.show();
        }

        /**
         * Create a category card element
         * @param {string} category - Category name
         * @param {number} productCount - Number of products in category
         * @returns {jQuery} jQuery element for the category card
         */
        function createCategoryCard(category, productCount) {
            // Map categories to icons
            const categoryIcons = {
                'Electronics': 'fa-laptop',
                'Clothing': 'fa-tshirt',
                'Home': 'fa-home',
                'Books': 'fa-book'
            };

            const icon = categoryIcons[category] || 'fa-tag';
            const productText = productCount === 1 ? '1 product' : productCount + ' products';

            const cardHtml = 
                '<div class="col-12 col-sm-6 col-lg-3 mb-4">' +
                    '<div class="card h-100 category-card" data-category="' + category + '" style="cursor: pointer;">' +
                        '<div class="card-body text-center">' +
                            '<div class="category-icon mb-3">' +
                                '<i class="fas ' + icon + ' fa-4x text-primary"></i>' +
                            '</div>' +
                            '<h4 class="card-title">' + category + '</h4>' +
                            '<p class="card-text text-muted">' +
                                '<i class="fas fa-box"></i> ' + productText +
                            '</p>' +
                            '<button class="btn btn-primary btn-block">' +
                                '<i class="fas fa-arrow-right"></i> Browse ' + category +
                            '</button>' +
                        '</div>' +
                    '</div>' +
                '</div>';

            const $card = $(cardHtml);

            // Add click handler to navigate to products page with category filter
            $card.find('.category-card, button').on('click', function(e) {
                e.preventDefault();
                navigateToCategory(category);
            });

            return $card;
        }

        /**
         * Navigate to products page with category filter applied
         * @param {string} category - Category name
         */
        function navigateToCategory(category) {
            // Navigate to products page with category parameter
            window.location.href = 'products.html?category=' + encodeURIComponent(category);
        }

        /**
         * Show loading indicator
         */
        function showLoading() {
            $('#loading-indicator').show();
            $('#categories-container').hide();
            $('#no-categories-message').hide();
        }

        /**
         * Hide loading indicator
         */
        function hideLoading() {
            $('#loading-indicator').hide();
        }

        /**
         * Show no categories message
         */
        function showNoCategories() {
            $('#no-categories-message').show();
        }

        /**
         * Show error message
         * @param {string} message - Error message
         */
        function showError(message) {
            const container = $('#categories-container');
            container.html(
                '<div class="col-12">' +
                '<div class="alert alert-danger" role="alert">' +
                '<i class="fas fa-exclamation-triangle"></i> ' + message +
                '</div>' +
                '</div>'
            );
            container.show();
        }
    </script>
</body>
</html>
