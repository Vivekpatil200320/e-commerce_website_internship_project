<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Products - E-Commerce Store</title>
    
    <!-- Bootstrap 4.5 CSS -->
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    
    <!-- Font Awesome 5.10.0 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.10.0/css/all.min.css">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/custom.css">
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="index.html">
                <i class="fas fa-store"></i> E-Commerce Store
            </a>
            <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarNav" 
                    aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ml-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="index.html">
                            <i class="fas fa-home"></i> Home
                        </a>
                    </li>
                    <li class="nav-item active">
                        <a class="nav-link" href="products.html">
                            <i class="fas fa-box"></i> Products
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="categories.html">
                            <i class="fas fa-list"></i> Categories
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="cart.html">
                            <i class="fas fa-shopping-cart"></i> Cart
                            <span class="badge badge-pill badge-danger cart-badge">0</span>
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main>
        <div class="container-fluid py-4">
            <div class="row">
                <!-- Filter Sidebar -->
                <aside class="col-lg-3 col-md-4 mb-4">
                    <div class="card">
                        <div class="card-header bg-primary text-white">
                            <h5 class="mb-0">
                                <i class="fas fa-filter"></i> Filters
                            </h5>
                        </div>
                        <div class="card-body">
                            <form id="filter-form">
                                <!-- Category Filter -->
                                <div class="form-group">
                                    <label for="category-filter">
                                        <i class="fas fa-tag"></i> Category
                                    </label>
                                    <select id="category-filter" class="form-control">
                                        <option value="">All Categories</option>
                                        <!-- Categories will be loaded dynamically -->
                                    </select>
                                </div>

                                <!-- Price Range Filter -->
                                <div class="form-group">
                                    <label>
                                        <i class="fas fa-dollar-sign"></i> Price Range
                                    </label>
                                    <div class="row">
                                        <div class="col-6">
                                            <input type="number" id="min-price" class="form-control" 
                                                   placeholder="Min" min="0" step="0.01">
                                        </div>
                                        <div class="col-6">
                                            <input type="number" id="max-price" class="form-control" 
                                                   placeholder="Max" min="0" step="0.01">
                                        </div>
                                    </div>
                                </div>

                                <!-- Availability Filter -->
                                <div class="form-group">
                                    <div class="custom-control custom-checkbox">
                                        <input type="checkbox" class="custom-control-input" 
                                               id="availability-filter">
                                        <label class="custom-control-label" for="availability-filter">
                                            <i class="fas fa-check-circle"></i> In Stock Only
                                        </label>
                                    </div>
                                </div>

                                <!-- Filter Buttons -->
                                <div class="form-group mb-0">
                                    <button type="submit" class="btn btn-primary btn-block">
                                        <i class="fas fa-search"></i> Apply Filters
                                    </button>
                                    <button type="button" id="clear-filters" class="btn btn-secondary btn-block">
                                        <i class="fas fa-times"></i> Clear Filters
                                    </button>
                                </div>
                            </form>
                        </div>
                    </div>
                </aside>

                <!-- Products Grid -->
                <section class="col-lg-9 col-md-8">
                    <div class="mb-3">
                        <h2>All Products</h2>
                        <p class="text-muted" id="product-count">Loading products...</p>
                    </div>

                    <!-- Loading Indicator -->
                    <div id="loading-indicator" class="text-center py-5" style="display: none;">
                        <div class="loading-spinner"></div>
                        <p class="mt-3 text-muted">Loading products...</p>
                    </div>

                    <!-- Products Container -->
                    <div id="products-container" class="row">
                        <!-- Products will be loaded here dynamically -->
                    </div>

                    <!-- No Products Message -->
                    <div id="no-products-message" class="text-center py-5" style="display: none;">
                        <i class="fas fa-box-open fa-3x text-muted mb-3"></i>
                        <p class="text-muted">No products found matching your filters.</p>
                    </div>
                </section>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="bg-dark text-white py-4 mt-5">
        <div class="container text-center">
            <p class="mb-0">&copy; 2024 E-Commerce Store. All rights reserved.</p>
        </div>
    </footer>

    <!-- jQuery 3.x -->
    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    
    <!-- Bootstrap 4.5 JS -->
    <script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.1/dist/umd/popper.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
    
    <!-- Products Module -->
    <script src="js/products.js"></script>
    
    <!-- Cart Module -->
    <script src="js/cart.js"></script>
    
    <!-- Filters Module -->
    <script src="js/filters.js"></script>
    
    <!-- Custom JS -->
    <script src="js/main.js"></script>
    
    <!-- Application Controller -->
    <script src="js/app.js"></script>
    
    <!-- Products Page Script -->
    <script>
        $(document).ready(function() {
            // Initialize the products page
            initProductsPage();
        });

        /**
         * Initialize the products page
         */
        function initProductsPage() {
            // Load categories for filter dropdown
            loadCategories();
            
            // Check for category URL parameter
            const urlParams = new URLSearchParams(window.location.search);
            const categoryParam = urlParams.get('category');
            
            if (categoryParam) {
                // Set category filter and apply
                $('#category-filter').val(categoryParam);
                // Wait for categories to load before applying filter
                setTimeout(function() {
                    applyFilters();
                }, 100);
            } else {
                // Load and display all products initially
                loadAndDisplayProducts();
            }
            
            // Set up filter form submission
            $('#filter-form').on('submit', function(e) {
                e.preventDefault();
                applyFilters();
            });
            
            // Set up clear filters button
            $('#clear-filters').on('click', function() {
                clearFilters();
            });
        }

        /**
         * Load categories into the filter dropdown
         */
        function loadCategories() {
            ProductsModule.getCategories()
                .then(function(categories) {
                    const categorySelect = $('#category-filter');
                    categories.forEach(function(category) {
                        categorySelect.append(
                            '<option value="' + category + '">' + category + '</option>'
                        );
                    });
                })
                .catch(function(error) {
                    console.error('Error loading categories:', error);
                });
        }

        /**
         * Load and display all products
         */
        function loadAndDisplayProducts() {
            showLoading();
            
            ProductsModule.loadProducts()
                .then(function(products) {
                    hideLoading();
                    renderProducts(products);
                    updateProductCount(products.length);
                })
                .catch(function(error) {
                    hideLoading();
                    console.error('Error loading products:', error);
                    showError('Failed to load products. Please try again later.');
                });
        }

        /**
         * Apply filters and display filtered products
         */
        function applyFilters() {
            const filters = FiltersModule.getFilterValues();
            showLoading();
            
            FiltersModule.applyFilters(filters)
                .then(function(filteredProducts) {
                    hideLoading();
                    renderProducts(filteredProducts);
                    updateProductCount(filteredProducts.length);
                })
                .catch(function(error) {
                    hideLoading();
                    console.error('Error applying filters:', error);
                    showError('Failed to apply filters. Please try again.');
                });
        }

        /**
         * Clear all filters and display all products
         */
        function clearFilters() {
            FiltersModule.clearFilters();
            loadAndDisplayProducts();
        }

        /**
         * Render products in the grid
         * @param {Array} products - Array of products to display
         */
        function renderProducts(products) {
            const container = $('#products-container');
            const noProductsMessage = $('#no-products-message');
            
            container.empty();
            
            if (products.length === 0) {
                container.hide();
                noProductsMessage.show();
                return;
            }
            
            noProductsMessage.hide();
            container.show();
            
            products.forEach(function(product) {
                const productCard = createProductCard(product);
                container.append(productCard);
            });
        }

        /**
         * Create a product card element
         * @param {Object} product - Product object
         * @returns {jQuery} jQuery element for the product card
         */
        function createProductCard(product) {
            // Truncate description to brief version (first 100 characters)
            const briefDescription = product.description.length > 100 
                ? product.description.substring(0, 100) + '...' 
                : product.description;

            // Get first image or use placeholder
            const imageUrl = product.images && product.images.length > 0 
                ? product.images[0] 
                : 'images/placeholder.jpg';

            // Requirement 12.2: Add unavailability indicator for out-of-stock products
            const availabilityBadge = product.availability 
                ? '<span class="badge badge-success"><i class="fas fa-check-circle"></i> In Stock</span>' 
                : '<span class="badge badge-secondary"><i class="fas fa-times-circle"></i> Out of Stock</span>';
            
            const cardOpacity = product.availability ? '' : 'style="opacity: 0.7;"';

            // Create card HTML with responsive grid classes
            const cardHtml = 
                '<div class="col-12 col-sm-6 col-lg-4 col-xl-3 mb-4">' +
                    '<div class="card h-100 product-card" data-product-id="' + product.id + '" ' + cardOpacity + ' style="cursor: pointer;">' +
                        '<img src="' + imageUrl + '" class="card-img-top" alt="' + product.name + '" ' +
                             'onerror="this.src=\'images/placeholder.jpg\'">' +
                        '<div class="card-body d-flex flex-column">' +
                            '<h5 class="card-title">' + product.name + '</h5>' +
                            '<p class="card-text text-muted small">' + briefDescription + '</p>' +
                            '<div class="mt-auto">' +
                                '<p class="h5 text-primary mb-2">$' + product.price.toFixed(2) + '</p>' +
                                availabilityBadge +
                            '</div>' +
                        '</div>' +
                    '</div>' +
                '</div>';

            const $card = $(cardHtml);

            // Add click handler to navigate to product detail page
            $card.find('.product-card').on('click', function() {
                window.location.href = 'product-detail.html?id=' + product.id;
            });

            return $card;
        }

        /**
         * Update the product count display
         * @param {number} count - Number of products
         */
        function updateProductCount(count) {
            const countText = count === 1 ? '1 product' : count + ' products';
            $('#product-count').text('Showing ' + countText);
        }

        /**
         * Show loading indicator
         */
        function showLoading() {
            $('#loading-indicator').show();
            $('#products-container').hide();
            $('#no-products-message').hide();
        }

        /**
         * Hide loading indicator
         */
        function hideLoading() {
            $('#loading-indicator').hide();
        }

        /**
         * Show error message
         * @param {string} message - Error message to display
         */
        function showError(message) {
            const container = $('#products-container');
            container.html(
                '<div class="col-12">' +
                '<div class="alert alert-danger" role="alert">' +
                '<i class="fas fa-exclamation-triangle"></i> ' + message +
                '</div>' +
                '</div>'
            );
            container.show();
        }
    </script>
</body>
</html>
